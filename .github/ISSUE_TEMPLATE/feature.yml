name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the use case before the proposed implementation.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to accomplish? What's blocked or hard today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? What's the API or UX?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about? Why not those?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links, screenshots, related issues
