name: Bug report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please include enough detail for us to reproduce.
        For security vulnerabilities, see [SECURITY.md](../../blob/main/SECURITY.md) — do not file a public issue.

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npm view @yocoolab/mcp-server version` or your installed version
      placeholder: e.g. 1.1.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: e.g. v20.11.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: AI agent
      description: Which MCP client are you using?
      placeholder: e.g. Claude Code, Cursor, Cline, Roo, Windsurf
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction steps
      placeholder: |
        1. Run `npx -y @yocoolab/mcp-server@1 setup`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stderr output
      description: Paste any relevant error output. Redact tokens or other secrets first.
      render: shell
