name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub release
      id-token: write   # for npm provenance / OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # Trusted publishing OIDC requires npm 11+. Node 22 ships npm 10.x; upgrade in place.
      # --force works around the known self-upgrade bootstrap bug (MODULE_NOT_FOUND on promise-retry).
      - run: npm install -g npm@11 --force
      - run: npm --version

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          # Trusted publishing uses OIDC — clear setup-node's placeholder
          # auth token so npm doesn't try (and fail) to use it.
          NODE_AUTH_TOKEN: ""

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
